databases:
  - name: track-the-web-db
    plan: free
    databaseName: trackweb
    user: trackweb_user
    region: oregon
    postgresMajorVersion: "16"

services:
  - type: keyvalue
    name: track-the-web-kv
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: track-the-web
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: tencent/hy3:free
      - key: OPENROUTER_WEB_SEARCH
        value: "true"
      # Free plan = 512MB. Keep concurrency low; queue can still grow forever.
      - key: SWARM_MAX_CONCURRENT
        value: "8"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=400"
      - key: SWARM_MIN_RUNTIME_MS
        value: "3600000"
      - key: NEXT_PUBLIC_APP_URL
        value: https://track-the-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: track-the-web-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: track-the-web-kv
          type: keyvalue
          property: connectionString
